[supervisord]
logfile=/data/.openclaw/workspace/polymarket_paper/supervisord.log
pidfile=/data/.openclaw/workspace/polymarket_paper/supervisord.pid
childlogdir=/data/.openclaw/workspace/polymarket_paper
nodaemon=true

[program:polymarket_trader]
directory=/data/.openclaw/workspace/polymarket_paper
command=/data/.openclaw/workspace/polymarket_paper/.venv/bin/python trader.py
autostart=true
autorestart=true
startsecs=5
stopasgroup=true
killasgroup=true
stdout_logfile=/data/.openclaw/workspace/polymarket_paper/trader_supervisor.out.log
stderr_logfile=/data/.openclaw/workspace/polymarket_paper/trader_supervisor.err.log
stdout_logfile_maxbytes=5MB
stderr_logfile_maxbytes=5MB
stdout_logfile_backups=5
stderr_logfile_backups=5
environment=PYTHONUNBUFFERED="1"
